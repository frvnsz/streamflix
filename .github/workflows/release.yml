name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version/tag to publish, for example v1.7.226. Leave blank to use the current branch name.'
        required: false
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build ${{ matrix.layout.label }} APK
    runs-on: ubuntu-latest
    env:
      SIGNING_KEYSTORE: ${{ secrets.KEYSTORE }}
      SIGNING_KEY_ALIAS_VALUE: ${{ secrets.SIGNING_KEY_ALIAS }}
      SIGNING_STORE_PASSWORD_VALUE: ${{ secrets.SIGNING_STORE_PASSWORD }}
      SIGNING_KEY_PASSWORD_VALUE: ${{ secrets.SIGNING_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        layout:
          - label: universal
            app_layout: ''
            suffix: ''
          - label: mobile
            app_layout: mobile
            suffix: -only-mobile
          - label: tv
            app_layout: tv
            suffix: -only-tv

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Configure Android build properties
        env:
          APP_LAYOUT: ${{ matrix.layout.app_layout }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUBDL_API_KEY: ${{ secrets.SUBDL_API_KEY }}
          RABBITSTREAM_SOURCE_API: ${{ secrets.RABBITSTREAM_SOURCE_API }}
        run: |
          cat > local.properties <<EOF_PROPS
          APP_LAYOUT=${APP_LAYOUT}
          TMDB_API_KEY=${TMDB_API_KEY}
          SUBDL_API_KEY=${SUBDL_API_KEY}
          RABBITSTREAM_SOURCE_API=${RABBITSTREAM_SOURCE_API}
          EOF_PROPS

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign release APK
        id: sign_apk
        if: ${{ env.SIGNING_KEYSTORE != '' && env.SIGNING_KEY_ALIAS_VALUE != '' && env.SIGNING_STORE_PASSWORD_VALUE != '' && env.SIGNING_KEY_PASSWORD_VALUE != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ env.SIGNING_KEYSTORE }}
          alias: ${{ env.SIGNING_KEY_ALIAS_VALUE }}
          keyStorePassword: ${{ env.SIGNING_STORE_PASSWORD_VALUE }}
          keyPassword: ${{ env.SIGNING_KEY_PASSWORD_VALUE }}
        env:
          BUILD_TOOLS_VERSION: '36.0.0'

      - name: Prepare APK for upload
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          SUFFIX: ${{ matrix.layout.suffix }}
          SIGNED_RELEASE_FILE: ${{ steps.sign_apk.outputs.signedReleaseFile }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION:-}"
          if [ -z "$VERSION" ]; then
            VERSION="$REF_NAME"
          fi
          mkdir -p release-apks
          if [ -n "${SIGNED_RELEASE_FILE:-}" ] && [ -f "$SIGNED_RELEASE_FILE" ]; then
            SOURCE_APK="$SIGNED_RELEASE_FILE"
          else
            SOURCE_APK="$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          fi
          cp "$SOURCE_APK" "release-apks/${REPOSITORY_NAME}-${VERSION}${SUFFIX}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.layout.label }}-apk
          path: release-apks/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-apks
          merge-multiple: true

      - name: Choose release tag
        id: release_info
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          VERSION="${INPUT_VERSION:-}"
          if [ -z "$VERSION" ]; then
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              VERSION="$REF_NAME"
            else
              VERSION="manual-${SHA:0:7}"
            fi
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Streamflix ${{ steps.release_info.outputs.tag }}
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          files: release-apks/*.apk
